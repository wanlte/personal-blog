<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 个人博客</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <div class="container">
        <div class="auth-container">
            <div class="auth-tabs">
                <button class="tab-btn active" data-tab="login">登录</button>
                <button class="tab-btn" data-tab="register">注册</button>
            </div>
            
            <!-- 登录表单 -->
            <div id="loginForm" class="auth-form active">
                <h2>欢迎回来</h2>
                <div class="form-group">
                    <input type="text" id="loginUsername" placeholder="用户名" required>
                </div>
                <div class="form-group">
                    <input type="password" id="loginPassword" placeholder="密码" required>
                </div>
                <button id="loginBtn" class="btn btn-primary">登录</button>
                <div id="loginMessage" class="message"></div>
            </div>
            
            <!-- 注册表单 -->
            <div id="registerForm" class="auth-form">
                <h2>创建账号</h2>
                <div class="form-group">
                    <input type="text" id="regUsername" placeholder="用户名" required>
                </div>
                <div class="form-group">
                    <input type="password" id="regPassword" placeholder="密码（至少6位）" required>
                </div>
                <button id="registerBtn" class="btn btn-primary">注册</button>
                <div id="registerMessage" class="message"></div>
            </div>
        </div>
    </div>
    <script src="/auth.js"></script>
</body>
</html>
