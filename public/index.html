<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人博客</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>📝 个人博客</h1>
            <p>记录学习与成长</p>
            <div class="header-actions">
                <div class="search-box">
                    <input type="text" id="searchInput" placeholder="搜索文章..." class="search-input">
                    <button id="searchBtn" class="search-btn">🔍</button>
                </div>
                <div id="userInfo" class="user-info"></div>
                <a href="/write.html" class="write-btn">✍️ 写文章</a>
            </div>
        </header>

        <div class="blog-layout">
            <!-- 主内容区 -->
            <main class="main-content">
                <div class="articles-list" id="articlesList">
                    <div class="loading">加载中...</div>
                </div>
            </main>
            
            <!-- 侧边栏 -->
            <aside class="sidebar">
                
                <!-- 文章归档 -->
                <div class="sidebar-section">
                    <h3>📁 文章归档</h3>
                    <div id="archiveList" class="archive-list">
                        <div class="loading">加载中...</div>
                    </div>
                </div>

                <!-- 热门文章排行榜 -->
                <div class="sidebar-section">
                    <h3>🔥 热门文章</h3>
                    <div id="popularList" class="popular-list">
                        <div class="loading">加载中...</div>
                    </div>
                </div>
                
                <!-- 标签云 -->
                <div class="sidebar-section">
                    <h3>🏷️ 标签云</h3>
                    <div id="tagList" class="tag-cloud"></div>
                </div>
            </aside>
        </div>
    </div>

    <script src="/app.js"></script>
</body>
</html>
