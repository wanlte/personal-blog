# nginx/default.conf - 博客反向代理配置
upstream blog_app {
    server app:3000;
    keepalive 64;
}

# HTTP → HTTPS 重定向（启用 HTTPS 时取消注释）
# server {
#     listen 80;
#     server_name your-domain.com;
#     return 301 https://$host$request_uri;
# }

# server {
#     listen 443 ssl http2;
#     server_name your-domain.com;

#     ssl_certificate     /etc/nginx/ssl/cert.pem;
#     ssl_certificate_key /etc/nginx/ssl/key.pem;
#     ssl_protocols       TLSv1.2 TLSv1.3;
#     ssl_ciphers         HIGH:!aNULL:!MD5;

server {
    listen 80;
    server_name _;

    # ===== 字符集 =====
    charset utf-8;

    # ===== 安全响应头 =====
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # ===== Gzip 压缩 =====
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml
        font/woff
        font/woff2;

    # ===== 静态资源缓存（30天） =====
    location /public/ {
        alias /app/public/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location /uploads/ {
        alias /app/uploads/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ===== SVG/ICO 等资源的缓存 =====
    location ~* \.(jpg|jpeg|png|gif|ico|webp|svg|woff|woff2|ttf|eot)$ {
        root /app/public;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location ~* \.(css|js)$ {
        root /app/public;
        expires 7d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ===== 反向代理到 Node.js =====
    location / {
        proxy_pass http://blog_app;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;

        # 禁用缓存（动态内容）
        add_header Cache-Control "no-store";
    }

    # ===== 日志 =====
    access_log /var/log/nginx/blog_access.log;
    error_log  /var/log/nginx/blog_error.log warn;

    # ===== 限制请求体大小（匹配 Multer 5MB 限制） =====
    client_max_body_size 10m;
}
