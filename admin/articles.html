<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>文章管理 - 管理后台</title>
<link rel="stylesheet" href="/admin/style.css">
</head>
<body>
<div id="sidebar"></div>
<div class="main">
  <div id="header"></div>
  <div class="content">
    <div class="table-card">
      <div class="table-header">
        <h2>📝 文章管理</h2>
        <select class="form-control" id="statusFilter" style="width:140px" onchange="loadArticles()">
          <option value="">全部状态</option>
          <option value="published">已发布</option>
          <option value="draft">草稿</option>
          <option value="archived">已归档</option>
        </select>
        <div class="search-box">
          <input type="text" class="form-control" id="search" placeholder="搜索标题..." oninput="debounceSearch()">
        </div>
        <span class="spacer"></span>
      </div>
      <div id="tableBody"></div>
      <div id="pagination"></div>
    </div>
  </div>
</div>
<script src="/admin/js/auth.js"></script>
<script src="/admin/js/api.js"></script>
<script src="/admin/js/components.js"></script>
<script>
let page = 1, searchTimer;

function debounceSearch() { clearTimeout(searchTimer); searchTimer = setTimeout(() => { page = 1; loadArticles(); }, 400); }

async function loadArticles() {
  try {
    const status = document.getElementById('statusFilter').value;
    const search = document.getElementById('search').value;
    const data = await API.articles.list({ page, limit: 20, ...(status && { status }), ...(search && { search }) });
    document.getElementById('tableBody').innerHTML = UI.renderTable(
      [
        { key:'id', label:'ID' },
        { key:'title', label:'标题' },
        { key:'user', label:'作者', render: r => r.user?.username || '-' },
        { key:'status', label:'状态', render: r => UI.statusBadge(r.status) },
        { key:'views', label:'浏览', render: r => r.views || 0 },
        { key:'createdAt', label:'发布时间', render: r => UI.formatDate(r.createdAt) },
      ],
      data.data,
      (row) => `
        <button class="btn btn-sm btn-outline" onclick="toggleStatus(${row.id},'${row.status}')">${row.status==='published'?'下架':'发布'}</button>
        <button class="btn btn-sm btn-outline" onclick="togglePin(${row.id},${row.isPinned})">${row.isPinned?'取消置顶':'置顶'}</button>
        <button class="btn btn-sm btn-danger" onclick="deleteArticle(${row.id})">删除</button>
      `
    );
    document.getElementById('pagination').innerHTML = UI.renderPagination(data.pagination, 'goPage');
  } catch (err) { UI.toast(err.message, 'error'); }
}

function goPage(p) { page = p; loadArticles(); }

async function toggleStatus(id, status) {
  await API.articles.update(id, { status: status === 'published' ? 'archived' : 'published' });
  UI.toast('更新成功', 'success');
  loadArticles();
}

async function togglePin(id, pinned) {
  await API.articles.update(id, { isPinned: pinned ? 0 : 1 });
  UI.toast('更新成功', 'success');
  loadArticles();
}

async function deleteArticle(id) {
  UI.modal('确认删除', '<p>此操作不可恢复，确定要删除这篇文章吗？</p>', async () => {
    await API.articles.delete(id);
    UI.toast('已删除', 'success');
    loadArticles();
  });
}

(async () => {
  if (!await Auth.guard(['super_admin', 'content_admin'])) return;
  document.getElementById('sidebar').innerHTML = UI.renderSidebar('articles');
  document.getElementById('header').innerHTML = UI.renderHeader('文章管理');
  loadArticles();
})();
</script>
</body>
</html>
