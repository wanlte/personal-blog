<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>管理员登录 - 博客后台</title>
<link rel="stylesheet" href="/admin/style.css">
</head>
<body class="login-page">
<div class="login-card">
  <h1>⚡ 管理后台</h1>
  <p>请使用管理员账号登录</p>
  <div class="error" id="error" style="display:none"></div>
  <form id="loginForm">
    <div class="form-group">
      <label>用户名</label>
      <input type="text" class="form-control" id="username" required autofocus>
    </div>
    <div class="form-group">
      <label>密码</label>
      <input type="password" class="form-control" id="password" required>
    </div>
    <button type="submit" class="btn btn-primary" style="width:100%;padding:10px;font-size:15px">登 录</button>
  </form>
  <p style="margin-top:16px;font-size:12px;text-align:center"><a href="/">← 返回网站</a></p>
</div>
<script src="/admin/js/auth.js"></script>
<script>
document.getElementById('loginForm').onsubmit = async (e) => {
  e.preventDefault();
  const errorEl = document.getElementById('error');
  errorEl.style.display = 'none';
  try {
    await Auth.login(
      document.getElementById('username').value,
      document.getElementById('password').value
    );
    window.location.href = '/admin/';
  } catch (err) {
    errorEl.textContent = err.message;
    errorEl.style.display = 'block';
  }
};
</script>
</body>
</html>
