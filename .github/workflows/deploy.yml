name: CI/CD Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '20'

jobs:
  # ============================================================
  # Job 1: 运行测试
  # ============================================================
  test:
    name: Test (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: blog_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/blog_test?schema=public

    steps:
      - name: Checkout 代码
        uses: actions/checkout@v4

      - name: 设置 Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: 安装依赖
        run: npm ci

      - name: 生成 Prisma Client
        run: npx prisma generate

      - name: 同步数据库 Schema
        run: npx prisma db push --skip-generate
        env:
          DATABASE_URL: ${{ env.TEST_DATABASE_URL }}

      - name: 运行测试 + 覆盖率
        run: npm run test:coverage
        env:
          DATABASE_URL: ${{ env.TEST_DATABASE_URL }}

      - name: 上传覆盖率报告
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-node-${{ matrix.node-version }}
          path: coverage/
          retention-days: 7

  # ============================================================
  # Job 2: 代码检查
  # ============================================================
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 代码
        uses: actions/checkout@v4

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 安装依赖
        run: npm ci

      - name: 运行 ESLint
        run: npx eslint . --ext .js

  # ============================================================
  # Job 3: 部署到服务器（仅 main 分支 push）
  # ============================================================
  deploy:
    name: Deploy
    needs: [test, lint]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: 通过 SSH 部署到服务器
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          script: |
            set -e

            PROJECT_DIR="${DEPLOY_PATH:-/var/www/blog}"
            cd "$PROJECT_DIR"

            echo ">>> 拉取最新代码..."
            git pull origin main

            echo ">>> 安装生产依赖..."
            npm ci --omit=dev

            echo ">>> 生成 Prisma Client..."
            npx prisma generate

            echo ">>> 运行数据库迁移..."
            npx prisma migrate deploy

            echo ">>> 重启服务..."
            pm2 restart blog-api --update-env || pm2 start server.js --name blog-api

            echo ">>> 部署完成 ✓"
