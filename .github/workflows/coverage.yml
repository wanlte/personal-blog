# .github/workflows/coverage.yml - 测试覆盖率自动上传
name: Coverage

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-coverage:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: 123456
          POSTGRES_DB: blog_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Push schema to test DB
        run: npx prisma db push --force-reset --accept-data-loss
        env:
          DATABASE_URL: postgresql://postgres:123456@localhost:5432/blog_test?schema=public

      - name: Run tests with coverage
        run: npm run test:coverage
        env:
          DATABASE_URL: postgresql://postgres:123456@localhost:5432/blog_test?schema=public
          REDIS_URL: redis://localhost:6379
          SKIP_REDIS: 'true'
          JWT_SECRET: test-secret-key-2024
          NODE_ENV: test
          LOG_LEVEL: silent
          DATABASE_POOL_SIZE: '10'
          DATABASE_CONNECTION_TIMEOUT: '10000'

      - name: Generate coverage badge
        run: npm run test:badge
        continue-on-error: true

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          directory: coverage
          flags: unittests
          fail_ci_if_error: false
        continue-on-error: true

      - name: Upload coverage report as artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            coverage/
            badges/
          retention-days: 7
