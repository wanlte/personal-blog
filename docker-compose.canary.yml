version: "3.9"

# 灰度部署 Canary 容器
# 与主 docker-compose.yml 共享 blog-network 网络和 DB/Redis
# 启动: docker compose -f docker-compose.canary.yml up -d
# 停止: docker compose -f docker-compose.canary.yml down

services:
  app-canary:
    image: blog-canary:latest
    container_name: blog-app-canary
    restart: unless-stopped
    ports:
      - "3001:3000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - blog-network
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=${JWT_SECRET}
      - FEATURE_FLAGS_ENABLED=true
    volumes:
      - uploads_data:/app/uploads
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health/db"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s

networks:
  blog-network:
    external: true

volumes:
  uploads_data:
    external: true
